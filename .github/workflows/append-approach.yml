name: Append AI Approach to README

on:
  push:
    branches:
      - main          # Change if your default branch is different

permissions:
  contents: write

jobs:
  append-approach:
    # Prevent the workflow from running on its own commit
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Approach
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python scripts/append_approach.py

      - name: Commit changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add .

            git commit -m "docs: append AI approach [skip ci]"

            git push
          else
            echo "No README files modified."
          fi
